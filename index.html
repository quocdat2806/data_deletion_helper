<h1>Data Deletion Instructions</h1>

<p>This app stores user data locally on the device.</p>

<p>Users can delete their data by:</p>

<ul>
  <li>Going to Settings in the app</li>
  <li>Selecting "Reset Data" or "Delete Data"</li>
  <li>Or uninstalling the app to remove all stored data</li>
</ul>

<p>No user data is stored on external servers.</p>
